rotateToolTip3d.tipText=Pyöritä valintaa napsauttamalla ja vetämällä kahvaa. Vaihtonäppäin painettuna pyöritys tapahtuu 5° askelin. Paina hiiren keskinäppäimellä, Ctrl painettuna määrittääksesi arvon liukusäätimellä tai kirjoittamalla kentään.
moveToolTip3d.tipText=Siirrä vaintaa akselin suuntaan napsauttamalla ja vetämällä kahvaa. Vaihtonäppäinen pitäminen painettuna siito tapahtuu taustaristikon mukaisissa askelissa. Käännä akseli kohtisuoraan näyttöä vastaan (ulos päin) napsauttamalla Ctrl painettuna, tai sisään päin Ctrl- ja vaihtonäppäimet painettuna. Paina hiiren keskinäppäimellä, Ctrl painettuna määrittääksesi arvon liukusäätimellä tai kirjoittamalla kentään.
scaleToolTip3d.tipText=Skaalaa valintaa akselikeskiön suhteen napsauttamalla ja vetämällä. Paina hiiren keskinäppäimellä, Ctrl painettuna määrittääksesi arvon liukusäätimellä tai kirjoittamalla kentään. Skaalaa työkalua vetämällä kahvasta Ctrl-näppäin painettuna.
centerTooTip3d.tipText=Siirrä valintaa napsauttamalla ja vetämällä. Siirrä ankkuripiste verkon piirteeseen (piste, viivan keskikohta, jne.) napsauttamalla Ctrl painettuna. Vaihda työkalun tilaa painamalla 'A': Oletus on mallin XYZ suunnat, UV-tila toimii näytön taossa ja NPQ näyttää järjestelmän, jossa N on valinnan normaali.
rotateToolTip2d.tipText=Pyöritä valintaa napsauttamalla ja vetämällä kahvaa. Vaihtonäppäin painettuna pyöritys tapahtuu 5° askelin. Paina hiiren keskinäppäimellä, Ctrl painettuna määrittääksesi arvon liukusäätimellä tai kirjoittamalla kentään. Vaihda skaalaustilaan napsauttamalla kahvaa.
moveToolTip2d.tipText=Siirrä valintaa akselin suuntaan napsauttamalla ja vetämällä kahvaa. Vaihtonäppäin painettuna siito tapahtuu taustaristikon mukaisissa askelissa. Käännä akseli kohtisuoraan näyttöä vastaan (ulos päin) napsauttamalla Ctrl painettuna. Paina hiiren keskinäppäimellä, Ctrl painettuna määrittääksesi arvon liukusäätimellä tai kirjoittamalla kentään. Vaihda pyöritystilaan napsauttamalla kahvaa.
scaleToolTip2d.tipText=Skaalaa valintaa napsauttamalla ja vetämällä. Paina hiiren keskinäppäimellä, Ctrl painettuna, määrittääksesi arvon liukusäätimellä tai kirjoittamalla kentään. Vaihtonäppäimen pitäminen painettuna sitoo skaalauksen kaikkiin akseleihin.
centerTooTip2d.tipText=Siirrä pyörityskeskiötä napsauttamalla ja vetämällä.

